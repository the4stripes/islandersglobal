<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islanders Global</title>
  <script src="https://unpkg.com/globe.gl"></script>
  <link rel="icon" type="image/png" href="logosquare-Photoroom.png">

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #globe {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #header {
      position: absolute;
      top: 40px;
      left: 40px;
      color: white;
      z-index: 10;
    }

    #header h1 {
      margin: 0;
      font-size: 48px;
      letter-spacing: 3px;
    }

    #header p {
      margin-top: 8px;
      color: orange;
      font-size: 18px;
    }

    #stats {
      position: absolute;
      top: 150px;
      left: 40px;
      color: white;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    #stats div {
      margin: 8px 0;
      font-size: 18px;
    }

    #feedStatus {
      display: none;
      color: #bbb;
      font-size: 12px;
    }

    body.debug-feed #feedStatus {
      display: block;
    }

    #countryPanel {
      position: absolute;
      top: 150px;
      right: 24px;
      width: 290px;
      z-index: 12;
      color: white;
      background: rgba(0, 0, 0, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      padding: 14px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 22px rgba(0, 0, 0, 0.35);
    }

    #countrySearch {
      width: 100%;
      height: 38px;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      padding: 0 12px;
      font-size: 15px;
      outline: none;
    }

    #countrySearch:focus {
      border-color: orange;
      box-shadow: 0 0 0 2px rgba(255, 140, 0, 0.18);
    }

    #countrySearch::placeholder {
      color: rgba(255, 255, 255, 0.72);
    }

    .country-summary {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      font-size: 14px;
    }

    #selectedCountryName {
      color: orange;
      font-weight: bold;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #selectedCountryCount {
      flex: 0 0 auto;
      color: #ddd;
      font-size: 13px;
    }

    #subdivisionStatus {
      min-height: 14px;
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 12px;
    }

    .country-bar {
      height: 8px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
    }

    #countryBarFill {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff7b00, #ffbf33);
      transition: width 0.25s ease;
    }

    #logo {
      position: absolute;
      top: 15px;
      right: 10px;
      width: 220px;
      height: auto;
      cursor: pointer;
      transition: opacity 0.3s ease, filter 0.3s ease;
      z-index: 10;
    }

    #logo:hover {
      opacity: 0.6;
      filter: blur(2px);
    }

    #submitButton {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      z-index: 20;
      overflow: hidden;
      border-radius: 50%;
      border: 3px solid orange;
      background: #050505;
      box-shadow: 0 0 24px rgba(255, 140, 0, 0.45);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    #submitButton:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 0 32px rgba(255, 140, 0, 0.65);
      opacity: 0.88;
    }

    #submitButton img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #popup {
      position: fixed;
      left: 40px;
      bottom: 40px;
      width: 320px;
      background: rgba(15, 15, 15, 0.95);
      color: white;
      border: 2px solid orange;
      border-radius: 16px;
      overflow: hidden;
      display: none;
      z-index: 30;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 25px rgba(255, 140, 0, 0.35);
    }

    #popup img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      cursor: zoom-in;
    }

    .popup-content {
      padding: 15px;
    }

    .popup-user {
      font-size: 20px;
      font-weight: bold;
      color: orange;
    }

    .popup-location {
      margin-top: 8px;
      color: #ccc;
    }

    #imageViewer {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
      background: rgba(0, 0, 0, 0.86);
      cursor: zoom-out;
    }

    #fullImage {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border: 2px solid orange;
      box-shadow: 0 0 32px rgba(255, 140, 0, 0.35);
    }

    @media (max-width: 700px) {
      #header {
        top: max(22px, env(safe-area-inset-top));
        left: 20px;
        right: 150px;
      }

      #header h1 {
        font-size: 29px;
        line-height: 1.08;
        letter-spacing: 4px;
      }

      #header p {
        margin-top: 10px;
        width: max-content;
        max-width: calc(100vw - 40px);
        font-size: 18px;
        line-height: 1.25;
      }

      #logo {
        top: max(24px, env(safe-area-inset-top));
        right: 16px;
        width: 124px;
      }

      #stats {
        position: fixed;
        top: auto;
        left: auto;
        right: 18px;
        bottom: 126px;
        width: auto;
        max-width: 175px;
        padding: 9px 11px;
        border-radius: 999px;
        text-align: right;
        background: rgba(0, 0, 0, 0.72);
        box-shadow: 0 0 16px rgba(255, 140, 0, 0.18);
      }

      #stats div {
        margin: 2px 0;
        font-size: 12px;
        line-height: 1.15;
        white-space: nowrap;
      }

      #popup {
        left: 16px;
        right: 16px;
        bottom: 96px;
        width: auto;
        height: 164px;
        border-radius: 18px;
      }

      #popup img {
        float: left;
        width: 38%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        border-right: 2px solid orange;
      }

      .popup-content {
        min-height: 100%;
        padding: 26px 18px 18px calc(38% + 18px);
        box-sizing: border-box;
      }

      .popup-user {
        font-size: 21px;
        line-height: 1.1;
      }

      .popup-location {
        margin-top: 8px;
        font-size: 15px;
        line-height: 1.25;
      }

      body.popup-open #stats {
        opacity: 0;
        pointer-events: none;
      }

      #countryPanel {
        top: auto;
        left: 18px;
        right: 112px;
        bottom: 18px;
        width: auto;
        padding: 10px;
        border-radius: 14px;
      }

      #countrySearch {
        height: 34px;
        border-radius: 9px;
        font-size: 14px;
      }

      .country-summary {
        margin-top: 8px;
        gap: 8px;
        font-size: 12px;
      }

      #selectedCountryCount {
        font-size: 11px;
      }

      #subdivisionStatus {
        margin-top: 6px;
        font-size: 10px;
      }

      .country-bar {
        height: 6px;
        margin-top: 7px;
      }

      body.popup-open #countryPanel {
        opacity: 0;
        pointer-events: none;
      }

      #submitButton {
        right: 18px;
        bottom: 18px;
        width: 68px;
        height: 68px;
      }
    }

    @media (max-width: 390px) {
      #header {
        right: 132px;
      }

      #header h1 {
        font-size: 25px;
        letter-spacing: 3px;
      }

      #header p,
      #stats div {
        font-size: 16px;
      }

      #stats div {
        font-size: 11px;
      }

      #logo {
        width: 112px;
      }

      #stats {
        right: 16px;
        bottom: 118px;
      }
    }
  </style>
</head>

<body>
  <div id="globe"></div>

  <header id="header">
    <h1>ISLANDERS GLOBAL</h1>
    <p>Repping the Isles Worldwide</p>
  </header>

  <img id="logo" src="logo" alt="Islanders Global logo">

  <section id="stats" aria-label="Fan stats">
    <div>Countries/Territories Repped: <span id="countryCount">0</span></div>
    <div>Fan Locations: <span id="locationCount">0</span></div>
    <div id="feedStatus">Loading submissions...</div>
  </section>

  <section id="countryPanel" aria-label="Country search">
    <label class="sr-only" for="countrySearch">Search country or territory</label>
    <input
      id="countrySearch"
      type="search"
      list="countryList"
      placeholder="Search country or territory"
      autocomplete="off"
    >
    <datalist id="countryList"></datalist>
    <div class="country-summary">
      <span id="selectedCountryName">Select a country</span>
      <span id="selectedCountryCount">0 submissions</span>
    </div>
    <div class="country-bar" aria-hidden="true">
      <span id="countryBarFill"></span>
    </div>
    <div id="subdivisionStatus"></div>
  </section>

  <a
    id="submitButton"
    href="https://docs.google.com/forms/d/e/1FAIpQLSfWoqU51VWJTCeAkGwv_S5V0fkQ8Q2hOvOdPC-CpHEn1rWhkQ/viewform?usp=header"
    target="_blank"
    rel="noopener noreferrer"
    title="Submit Photo"
  >
    <img src="logosquare-Photoroom.png" alt="">
    <span class="sr-only">Submit Photo</span>
  </a>

  <aside id="popup"></aside>

  <div id="imageViewer" aria-label="Expanded photo">
    <img id="fullImage" alt="">
  </div>

  <script>
    const WORLD_GEOJSON_URL = "https://cdn.jsdelivr.net/gh/johan/world.geo.json@master/countries.geo.json";
    const SUBMISSIONS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzxjWXHFh12-InLVSTfaDSNLVGjqIDylJ2J8IbKa8Z6f_JTB4Rw3W4rDTT0fECA-EIB/exec";
    const COUNTRY_LIST_URL = "https://cdn.jsdelivr.net/npm/world-countries@5/countries.json";
    const US_STATES_GEOJSON_URL = "https://cdn.jsdelivr.net/gh/codeforamerica/click_that_hood@master/public/data/united-states.geojson";
    const CANADA_SUBDIVISIONS_GEOJSON_URL = "https://cdn.jsdelivr.net/gh/codeforamerica/click_that_hood@master/public/data/canada.geojson";
    const SUPPLEMENTAL_BOUNDARIES = [
      {
        key: "french guiana",
        name: "French Guiana",
        replaceExisting: false,
        url: "https://cdn.jsdelivr.net/gh/wmgeolab/geoBoundaries@main/releaseData/gbOpen/GUF/ADM0/geoBoundaries-GUF-ADM0_simplified.geojson"
      },
      {
        key: "guinea-bissau",
        name: "Guinea-Bissau",
        replaceExisting: false,
        url: "https://cdn.jsdelivr.net/gh/wmgeolab/geoBoundaries@main/releaseData/gbOpen/GNB/ADM0/geoBoundaries-GNB-ADM0_simplified.geojson"
      },
      {
        key: "somalia",
        name: "Somalia",
        replaceExisting: false,
        url: "https://cdn.jsdelivr.net/gh/wmgeolab/geoBoundaries@main/releaseData/gbOpen/SOM/ADM0/geoBoundaries-SOM-ADM0_simplified.geojson"
      }
    ];
    const MOBILE_POINT_TAP_RADIUS_DEGREES = 5;
    const CLUSTER_ZOOM_ALTITUDE = 1.75;
    const MIN_POINT_RADIUS = 0.16;
    const MAX_POINT_RADIUS = 0.55;
    const MANUAL_PLACES = [
      {
        name: "French Guiana",
        key: "french guiana",
        lat: 3.9339,
        lng: -53.1258,
        aliases: ["french guiana", "guyane", "guyane francaise"]
      },
      {
        name: "Kosovo",
        key: "kosovo",
        lat: 42.6026,
        lng: 20.903,
        aliases: ["kosovo", "republic of kosovo", "xk", "xkx"]
      }
    ];

    const fallbackLocations = [
      {
        lat: 59.33,
        lng: 18.06,
        username: "vic.eklund",
        date: "Stockholm, Sweden, March 2026",
        country: "Sweden",
        photo: "https://www.dailyfaceoff.com/_next/image?url=https%3A%2F%2Fpublish.dailyfaceoff.com%2Fwp-content%2Fuploads%2F2025%2F06%2FSE5_3128-scaled.jpg&w=3840&q=75"
      }
    ];
    let locations = fallbackLocations;

    const popup = document.getElementById("popup");
    const imageViewer = document.getElementById("imageViewer");
    const fullImage = document.getElementById("fullImage");
    const countrySearch = document.getElementById("countrySearch");
    const countryList = document.getElementById("countryList");
    const selectedCountryName = document.getElementById("selectedCountryName");
    const selectedCountryCount = document.getElementById("selectedCountryCount");
    const countryBarFill = document.getElementById("countryBarFill");
    const subdivisionStatus = document.getElementById("subdivisionStatus");
    const feedStatus = document.getElementById("feedStatus");
    const debugFeed = new URLSearchParams(window.location.search).get("debug") === "1";

    if (debugFeed) {
      document.body.classList.add("debug-feed");
    }

    let hoveredCountry = null;
    let hoveredSubdivision = null;
    let selectedCountryKey = "";
    let baseCountryFeatures = [];
    let selectedSubdivisionFeatures = [];
    let countryFeatureLookup = new Map();
    let countryOptions = [];
    const subdivisionCache = new Map();
    let clusteringUpdateFrame = null;
    let ignoreNextDocumentClick = false;

    const closePopup = () => {
      popup.style.display = "none";
      document.body.classList.remove("popup-open");
    };

    const countryAliases = {
      "cabo verde": "cape verde",
      "cote divoire": "ivory coast",
      "czech republic": "czechia",
      "democratic republic of the congo": "dr congo",
      "republic of the congo": "congo",
      "russian federation": "russia",
      "south korea": "korea, republic of",
      "north korea": "korea, democratic people's republic of",
      "gaza": "palestine",
      "gaza strip": "palestine",
      "guinea bissau": "guinea-bissau",
      "palestinian territories": "palestine",
      "palestinian territory": "palestine",
      "somaliland": "somalia",
      "state of palestine": "palestine",
      "west bank": "palestine",
      "west bank and gaza": "palestine",
      "syrian arab republic": "syria",
      "turkiye": "turkey",
      "united republic of tanzania": "tanzania",
      "united states of america": "united states",
      "usa": "united states",
      "u.s.a.": "united states",
      "us": "united states",
      "uk": "united kingdom",
      "viet nam": "vietnam"
    };

    const usStateFipsNames = {
      "01": "Alabama",
      "02": "Alaska",
      "04": "Arizona",
      "05": "Arkansas",
      "06": "California",
      "08": "Colorado",
      "09": "Connecticut",
      "10": "Delaware",
      "11": "District of Columbia",
      "12": "Florida",
      "13": "Georgia",
      "15": "Hawaii",
      "16": "Idaho",
      "17": "Illinois",
      "18": "Indiana",
      "19": "Iowa",
      "20": "Kansas",
      "21": "Kentucky",
      "22": "Louisiana",
      "23": "Maine",
      "24": "Maryland",
      "25": "Massachusetts",
      "26": "Michigan",
      "27": "Minnesota",
      "28": "Mississippi",
      "29": "Missouri",
      "30": "Montana",
      "31": "Nebraska",
      "32": "Nevada",
      "33": "New Hampshire",
      "34": "New Jersey",
      "35": "New Mexico",
      "36": "New York",
      "37": "North Carolina",
      "38": "North Dakota",
      "39": "Ohio",
      "40": "Oklahoma",
      "41": "Oregon",
      "42": "Pennsylvania",
      "44": "Rhode Island",
      "45": "South Carolina",
      "46": "South Dakota",
      "47": "Tennessee",
      "48": "Texas",
      "49": "Utah",
      "50": "Vermont",
      "51": "Virginia",
      "53": "Washington",
      "54": "West Virginia",
      "55": "Wisconsin",
      "56": "Wyoming"
    };

    const cleanCountryName = name => (name || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .replace(/&/g, "and")
      .replace(/[^\w\s'-]/g, "")
      .replace(/\bthe\b/g, "")
      .replace(/\s+/g, " ")
      .trim();

    const countryKey = name => {
      const cleaned = cleanCountryName(name);
      return countryAliases[cleaned] || cleaned;
    };

    const getLocationCountry = location => {
      if (location.country) {
        return location.country;
      }

      return location.date.split(",")[1]?.trim() || "";
    };

    let countryCounts = buildCountryCounts(locations);

    const getLocationSubdivision = location =>
      location.subdivision ||
      location.state ||
      location.province ||
      location.territory ||
      location.region ||
      "";

    function buildCountryCounts(items) {
      return items.reduce((counts, location) => {
        const key = countryKey(getLocationCountry(location));

        if (key) {
          counts.set(key, (counts.get(key) || 0) + 1);
        }

        return counts;
      }, new Map());
    }

    function buildSubdivisionCounts(items) {
      return items.reduce((counts, location) => {
        const locationCountryKey = countryKey(getLocationCountry(location));
        const subdivision = getLocationSubdivision(location);

        if ((locationCountryKey === "united states" || locationCountryKey === "canada") && subdivision) {
          const key = `${locationCountryKey}|${countryKey(subdivision)}`;
          counts.set(key, (counts.get(key) || 0) + 1);
        }

        return counts;
      }, new Map());
    }

    let subdivisionCounts = buildSubdivisionCounts(locations);
    let clusteredLocations = buildExactLocationClusters(locations);
    let showingClusteredPins = true;
    let maxCountrySubmissions = Math.max(1, ...countryCounts.values());

    document.getElementById("locationCount").textContent = locations.length;
    document.getElementById("countryCount").textContent = countryCounts.size;

    const isMobile = () => window.innerWidth <= 700;

    const globe = Globe()(document.getElementById("globe"))
      .width(window.innerWidth)
      .height(window.innerHeight)
      .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-dark.jpg")
      .backgroundColor("#000")
      .pointsData(activePointData())
      .pointLat("lat")
      .pointLng("lng")
      .pointColor(point => point.isCluster ? "#ffbf33" : "#ff7b00")
      .pointAltitude(0.06)
      .pointRadius(pointRadius)
      .ringsData(activePointData())
      .ringLat("lat")
      .ringLng("lng")
      .ringColor(point => point.isCluster ? "#ffbf33" : "orange")
      .ringMaxRadius(3)
      .ringPropagationSpeed(2)
      .ringRepeatPeriod(1000)
      .labelsData(activeClusterLabels())
      .labelLat("lat")
      .labelLng("lng")
      .labelText(point => String(point.clusterCount))
      .labelAltitude(0.09)
      .labelSize(0.42)
      .labelColor(() => "#ffffff")
      .labelDotRadius(0)
      .pathsData([])
      .pathPoints("points")
      .pathPointLat(point => point.lat)
      .pathPointLng(point => point.lng)
      .pathPointAlt(() => 0.08)
      .pathColor(path => path.color)
      .pathStroke(path => path.stroke)
      .onPointClick(point => {
        handlePointClick(point);
      })
      .onGlobeClick(coords => {
        if (!isMobile()) {
          return;
        }

        const closestPoint = activePointData()
          .map(location => ({
            location,
            distance: globeDistanceDegrees(location, coords)
          }))
          .sort((a, b) => a.distance - b.distance)[0];

        if (closestPoint && closestPoint.distance < MOBILE_POINT_TAP_RADIUS_DEGREES) {
          handlePointClick(closestPoint.location);
        }
      });

    globe.controls().addEventListener("change", schedulePointClusteringUpdate);

    loadSubmissions();
    loadCountries();

    function openLocationCard(point) {
      ignoreNextDocumentClick = true;
      setTimeout(() => {
        ignoreNextDocumentClick = false;
      }, 0);

      popup.innerHTML = `
        <img src="${point.photo}" alt="Photo from ${point.date}">
          <div class="popup-content">
          <div class="popup-user">@${point.username}</div>
          <div class="popup-location">${point.date}</div>
        </div>
      `;

      popup.style.display = "block";
      document.body.classList.add("popup-open");

      const popupImg = popup.querySelector("img");
      popupImg.addEventListener("click", () => {
        fullImage.src = popupImg.src;
        fullImage.alt = popupImg.alt;
        imageViewer.style.display = "flex";
      });

      globe.pointOfView(
        { lat: point.lat, lng: point.lng, altitude: isMobile() ? 2.25 : 1.5 },
        isMobile() ? 650 : 1000
      );
      setTimeout(updatePointClustering, isMobile() ? 670 : 1020);
    }

    function handlePointClick(point) {
      if (point.isCluster) {
        closePopup();
        globe.pointOfView(
          { lat: point.lat, lng: point.lng, altitude: isMobile() ? 1.35 : 1.15 },
          700
        );
        setTimeout(updatePointClustering, 720);
        return;
      }

      openLocationCard(point);
    }

    function activePointData() {
      return showingClusteredPins ? clusteredLocations : locations;
    }

    function shouldClusterPins() {
      const pointOfView = globe?.pointOfView?.();
      const altitude = pointOfView?.altitude ?? (isMobile() ? 2.8 : 2.2);

      return altitude > CLUSTER_ZOOM_ALTITUDE;
    }

    function updatePointClustering() {
      const nextShowingClusteredPins = shouldClusterPins();

      if (nextShowingClusteredPins === showingClusteredPins) {
        globe.pointRadius(pointRadius);
        return;
      }

      showingClusteredPins = nextShowingClusteredPins;
      globe
        .pointsData(activePointData())
        .ringsData(activePointData())
        .labelsData(activeClusterLabels())
        .pointRadius(pointRadius);
    }

    function schedulePointClusteringUpdate() {
      if (clusteringUpdateFrame) {
        return;
      }

      clusteringUpdateFrame = requestAnimationFrame(() => {
        clusteringUpdateFrame = null;
        updatePointClustering();
      });
    }

    function activeClusterLabels() {
      return showingClusteredPins
        ? clusteredLocations.filter(point => point.isCluster)
        : [];
    }

    async function loadSubmissions() {
      try {
        const response = await fetch(`${SUBMISSIONS_WEB_APP_URL}?v=${Date.now()}`, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Submission feed did not load.");
        }

        const data = await response.json();
        const sheetLocations = normalizeSubmissionData(data);

        if (sheetLocations.length) {
          applyLocations(sheetLocations);
          feedStatus.textContent = `Loaded ${sheetLocations.length} approved submission${sheetLocations.length === 1 ? "" : "s"}`;
        } else {
          applyLocations([]);
          feedStatus.textContent = "No approved submissions loaded";
        }
      } catch (error) {
        applyLocations(fallbackLocations);
        feedStatus.textContent = "Using fallback data";
      }
    }

    function normalizeSubmissionData(data) {
      if (!Array.isArray(data)) {
        return [];
      }

      return data
        .map(item => {
          const country = getSubmissionValue(item, ["country"]);
          const coordinates = normalizeCoordinates(
            parseCoordinate(getSubmissionValue(item, ["lat", "latitude"])),
            parseCoordinate(getSubmissionValue(item, ["lng", "long", "lon", "longitude"])),
            country
          );
          const username = normalizeUsername(getSubmissionValue(item, [
            "username",
            "instagram",
            "instagram handle",
            "display name",
            "name",
            "name and/or instagram handle",
            "name and instagram handle"
          ]));

          return {
            username: username || "Islanders fan",
            city: getSubmissionValue(item, ["city"]),
            country,
            subdivision: getSubmissionValue(item, [
              "subdivision",
              "state",
              "province",
              "territory",
              "region",
              "state province territory"
            ]),
            date: getSubmissionValue(item, [
              "display location",
              "displayLocation",
              "date",
              "date of photo",
              "location",
              "location of the photo"
            ]),
            lat: coordinates.lat,
            lng: coordinates.lng,
            photo: normalizePhotoUrl(getSubmissionValue(item, [
              "photo",
              "photo url",
              "photoUrl",
              "public photo url",
              "publicPhotoUrl",
              "photo of you repping the isles"
            ]))
          };
        })
        .filter(item => item.photo && Number.isFinite(item.lat) && Number.isFinite(item.lng));
    }

    function getSubmissionValue(item, keys) {
      const exactValue = keys
        .map(key => item[key])
        .find(value => value !== undefined && value !== null && String(value).trim() !== "");

      if (exactValue !== undefined) {
        return String(exactValue).trim();
      }

      const entries = Object.entries(item).map(([key, value]) => ({
        key: normalizeSubmissionKey(key),
        value
      }));

      for (const target of keys.map(normalizeSubmissionKey)) {
        const entry = entries.find(({ key, value }) =>
          value !== undefined &&
          value !== null &&
          String(value).trim() !== "" &&
          (key === target || (target.length >= 8 && key.includes(target)))
        );

        if (entry) {
          return String(entry.value).trim();
        }
      }

      return "";
    }

    function normalizeSubmissionKey(key) {
      return String(key)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^\w\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeUsername(value) {
      return String(value || "").trim().replace(/^@+/, "");
    }

    function parseCoordinate(value) {
      const rawValue = String(value ?? "").trim().replace(/[−–—]/g, "-");

      if (!rawValue) {
        return NaN;
      }

      const match = rawValue.match(/-?\d+(?:\.\d+)?/);

      if (!match) {
        return NaN;
      }

      let coordinate = Number(match[0]);
      const direction = rawValue.toUpperCase().match(/\b([NSEW])\b|([NSEW])$/);
      const letter = direction?.[1] || direction?.[2] || "";

      if (letter === "S" || letter === "W") {
        coordinate = -Math.abs(coordinate);
      }

      if (letter === "N" || letter === "E") {
        coordinate = Math.abs(coordinate);
      }

      return coordinate;
    }

    function normalizeCoordinates(lat, lng, country) {
      if (Math.abs(lat) > 90 && Math.abs(lng) <= 90) {
        return { lat: lng, lng: lat };
      }

      const key = countryKey(country);
      const looksLikeSwappedNorthAmerica =
        (key === "canada" || key === "united states") &&
        lat < 0 &&
        lng > 0;

      if (looksLikeSwappedNorthAmerica) {
        return { lat: lng, lng: lat };
      }

      if ((key === "canada" || key === "united states") && lat > 0 && lng > 0) {
        return { lat, lng: -Math.abs(lng) };
      }

      return { lat, lng };
    }

    function normalizePhotoUrl(url) {
      const rawUrl = String(url || "").trim();

      if (!rawUrl) {
        return "";
      }

      const driveId = rawUrl.match(/\/d\/([^/]+)/)?.[1] || rawUrl.match(/[?&]id=([^&]+)/)?.[1];

      if (driveId) {
        return `https://drive.google.com/thumbnail?id=${driveId}&sz=w1600`;
      }

      return rawUrl;
    }

    function applyLocations(nextLocations) {
      locations = nextLocations;
      countryCounts = buildCountryCounts(locations);
      subdivisionCounts = buildSubdivisionCounts(locations);
      clusteredLocations = buildExactLocationClusters(locations);
      maxCountrySubmissions = Math.max(1, ...countryCounts.values());
      showingClusteredPins = shouldClusterPins();

      document.getElementById("locationCount").textContent = locations.length;
      document.getElementById("countryCount").textContent = countryCounts.size;

      globe
        .pointsData(activePointData())
        .ringsData(activePointData())
        .labelsData(activeClusterLabels())
        .pointRadius(pointRadius);

      refreshCountryHover();

      if (selectedCountryKey) {
        const count = countryCounts.get(selectedCountryKey) || 0;
        const barWidth = Math.round((count / maxCountrySubmissions) * 100);
        selectedCountryCount.textContent = pluralizeSubmission(count);
        countryBarFill.style.width = `${barWidth}%`;
      }
    }

    function pointRadius(point) {
      if (point.isCluster) {
        return 0.85;
      }

      const pointOfView = globe?.pointOfView?.();
      const altitude = pointOfView?.altitude ?? (isMobile() ? 2.8 : 2.2);
      const zoomProgress = Math.max(0, Math.min(1, (altitude - 0.75) / 1.25));

      return MIN_POINT_RADIUS + (MAX_POINT_RADIUS - MIN_POINT_RADIUS) * zoomProgress;
    }

    function buildExactLocationClusters(items) {
      const groups = new Map();

      items.forEach(location => {
        const key = `${Number(location.lat).toFixed(4)}|${Number(location.lng).toFixed(4)}`;

        if (!groups.has(key)) {
          groups.set(key, []);
        }

        groups.get(key).push(location);
      });

      return Array.from(groups.values()).flatMap(group => {
        if (group.length === 1) {
          return group;
        }

        const first = group[0];

        return [{
          ...first,
          isCluster: true,
          clusterCount: group.length,
          clusterItems: group,
          username: `${group.length} submissions`,
          date: first.date
        }];
      });
    }

    function globeDistanceDegrees(a, b) {
      const averageLat = ((a.lat + b.lat) / 2) * Math.PI / 180;
      const latDistance = a.lat - b.lat;
      const lngDistance = (a.lng - b.lng) * Math.cos(averageLat);

      return Math.hypot(latDistance, lngDistance);
    }

    function getFeatureName(feature) {
      return feature.properties?.__countryName ||
        feature.properties?.name ||
        feature.properties?.ADMIN ||
        feature.properties?.NAME ||
        "";
    }

    function getSubdivisionName(feature) {
      const properties = feature.properties || {};
      const fipsCode = String(
        properties.STATEFP ||
        properties.STATE ||
        properties.STATE_FIPS ||
        properties.state_fips ||
        ""
      ).padStart(2, "0");

      return feature.properties?.__subdivisionName ||
        properties.name ||
        properties.Name ||
        properties.NAME ||
        properties.NAME_1 ||
        properties.STATE_NAME ||
        properties.State_Name ||
        properties.state_name ||
        properties.province ||
        properties.Province ||
        properties.territory ||
        properties.Territory ||
        usStateFipsNames[fipsCode] ||
        "";
    }

    function isSearchableCountry(country) {
      return country.unMember ||
        country.cca2 === "VA" ||
        country.cca2 === "PS" ||
        country.cca2 === "GL";
    }

    function getCountryNameKeys(country) {
      return [
        country.name.common,
        country.name.official,
        ...(country.altSpellings || [])
      ].map(countryKey);
    }

    function getCountryCount(name) {
      return countryCounts.get(countryKey(name)) || 0;
    }

    function getCountryDisplayName(name) {
      const key = countryKey(name);

      if (key === "palestine") {
        return "Palestine";
      }

      if (key === "somalia") {
        return "Somalia";
      }

      if (key === "guinea-bissau") {
        return "Guinea-Bissau";
      }

      return name;
    }

    function getSubdivisionCount(countryKeyValue, subdivisionName) {
      return subdivisionCounts.get(`${countryKeyValue}|${countryKey(subdivisionName)}`) || 0;
    }

    function pluralizeSubmission(count) {
      return `${count} submission${count === 1 ? "" : "s"}`;
    }

    function countryTooltip(feature) {
      if (!feature || !getFeatureName(feature)) {
        return "";
      }

      const name = getFeatureName(feature);
      const displayName = getCountryDisplayName(name);
      const count = getCountryCount(name);

      return `
        <div style="padding: 8px 10px; color: white; background: rgba(0, 0, 0, 0.82); border: 1px solid orange; border-radius: 8px;">
          <strong style="color: orange;">${displayName}</strong><br>
          ${pluralizeSubmission(count)}
        </div>
      `;
    }

    function subdivisionTooltip(feature) {
      const subdivisionName = getSubdivisionName(feature);
      const countryKeyValue = feature.properties?.__countryKey || "";

      if (!subdivisionName || !countryKeyValue) {
        return "";
      }

      const count = getSubdivisionCount(countryKeyValue, subdivisionName);

      return `
        <div style="padding: 8px 10px; color: white; background: rgba(0, 0, 0, 0.84); border: 1px solid rgb(135, 225, 255); border-radius: 8px;">
          <strong style="color: rgb(135, 225, 255);">${subdivisionName}</strong><br>
          ${pluralizeSubmission(count)}
        </div>
      `;
    }

    function countryAltitude(feature) {
      if (!feature) {
        return 0.004;
      }

      if (feature.properties?.__layer === "subdivision") {
        return 0.085;
      }

      const key = feature.properties?.__countryKey || countryKey(getFeatureName(feature));

      return feature === hoveredCountry || key === selectedCountryKey ? 0.05 : 0.006;
    }

    function countryCapColor(feature) {
      if (!feature) {
        return "rgba(255, 255, 255, 0)";
      }

      if (feature.properties?.__layer === "subdivision") {
        return feature === hoveredSubdivision
          ? "rgba(135, 225, 255, 0.2)"
          : "rgba(135, 225, 255, 0.018)";
      }

      const key = feature.properties?.__countryKey || countryKey(getFeatureName(feature));

      if (key === selectedCountryKey) {
        return "rgba(0, 150, 255, 0.26)";
      }

      if (feature === hoveredCountry) {
        return "rgba(255, 123, 0, 0.34)";
      }

      return getCountryCount(getFeatureName(feature)) > 0
        ? "rgba(255, 123, 0, 0.2)"
        : "rgba(255, 255, 255, 0.035)";
    }

    function refreshCountryHover() {
      if (!baseCountryFeatures.length && !selectedSubdivisionFeatures.length) {
        return;
      }

      globe
        .polygonAltitude(countryAltitude)
        .polygonCapColor(countryCapColor);
    }

    function updatePolygonData() {
      globe.polygonsData([...baseCountryFeatures, ...selectedSubdivisionFeatures]);
    }

    async function loadCountries() {
      try {
        const [geoResponse, countryResponse] = await Promise.all([
          fetch(WORLD_GEOJSON_URL),
          fetch(COUNTRY_LIST_URL)
        ]);

        if (!geoResponse.ok || !countryResponse.ok) {
          throw new Error("Country data did not load.");
        }

        const world = await geoResponse.json();
        const countries = await countryResponse.json();
        const allowedCountryKeys = new Set(
          [
            ...countries
              .filter(isSearchableCountry)
              .flatMap(getCountryNameKeys),
            ...MANUAL_PLACES.flatMap(place => place.aliases)
          ]
        );
        const mainCountryFeatures = (world.features || [])
          .filter(feature => allowedCountryKeys.has(countryKey(getFeatureName(feature))));
        const supplementalBoundaries = await loadSupplementalBoundaries();
        const supplementalFeatures = supplementalBoundaries.flatMap(boundary => boundary.features);
        const replacedKeys = new Set(
          supplementalBoundaries
            .filter(boundary => boundary.replaceExisting && boundary.features.length)
            .map(boundary => boundary.key)
        );
        const countryFeatures = [
          ...mainCountryFeatures.filter(feature => !replacedKeys.has(countryKey(getFeatureName(feature)))),
          ...supplementalFeatures
        ];
        baseCountryFeatures = countryFeatures;
        countryFeatureLookup = new Map(
          countryFeatures.map(feature => [countryKey(getFeatureName(feature)), feature])
        );

        globe
          .polygonsData([...baseCountryFeatures, ...selectedSubdivisionFeatures])
          .polygonAltitude(countryAltitude)
          .polygonCapColor(countryCapColor)
          .polygonSideColor(feature =>
            feature.properties?.__layer === "subdivision"
              ? "rgba(135, 225, 255, 0.08)"
              : "rgba(255, 140, 0, 0.08)"
          )
          .polygonStrokeColor(feature =>
            feature.properties?.__layer === "subdivision"
              ? "rgba(135, 225, 255, 0.95)"
              : "rgba(255, 255, 255, 0.42)"
          )
          .polygonLabel(feature =>
            feature.properties?.__layer === "subdivision"
              ? subdivisionTooltip(feature)
              : countryTooltip(feature)
          )
          .onPolygonHover(feature => {
            hoveredSubdivision = feature?.properties?.__layer === "subdivision" ? feature : null;
            hoveredCountry = feature && feature.properties?.__layer !== "subdivision" && getFeatureName(feature)
              ? feature
              : null;
            refreshCountryHover();
          })
          .onPolygonClick(feature => {
            if (feature?.properties?.__layer !== "subdivision") {
              selectCountry(findCountry(getFeatureName(feature)));
            }
          });

        buildCountrySearch(countries, countryFeatures);
      } catch (error) {
        selectedCountryName.textContent = "Country search unavailable";
        selectedCountryCount.textContent = "";
      }
    }

    async function loadSupplementalBoundaries() {
      const results = await Promise.allSettled(
        SUPPLEMENTAL_BOUNDARIES.map(async boundary => {
          const response = await fetch(boundary.url);

          if (!response.ok) {
            throw new Error(`${boundary.name} boundary did not load.`);
          }

          const geojson = await response.json();

          return {
            key: boundary.key,
            replaceExisting: boundary.replaceExisting,
            features: (geojson.features || []).map(feature => ({
              ...feature,
              properties: {
                ...(feature.properties || {}),
                __countryKey: boundary.key,
                __countryName: boundary.name
              }
            }))
          };
        })
      );

      return results.flatMap(result => result.status === "fulfilled" ? result.value : []);
    }

    function buildCountrySearch(countries, countryFeatures) {
      const featureLookup = new Map(
        countryFeatures.map(feature => {
          const name = getFeatureName(feature);
          return [countryKey(name), feature];
        })
      );

      countryOptions = countries
        .filter(isSearchableCountry)
        .map(country => {
          const name = country.name.common;
          const key = countryKey(name);
          const matchingFeature = featureLookup.get(key);
          const center = Array.isArray(country.latlng) && country.latlng.length === 2
            ? { lat: country.latlng[0], lng: country.latlng[1] }
            : getFeatureCenter(matchingFeature);

          return {
            name,
            key,
            lat: center.lat,
            lng: center.lng,
            aliases: getCountryNameKeys(country)
          };
        })
        .concat(MANUAL_PLACES)
        .filter(country => Number.isFinite(country.lat) && Number.isFinite(country.lng))
        .sort((a, b) => a.name.localeCompare(b.name));

      countryList.innerHTML = countryOptions
        .map(country => `<option value="${country.name}"></option>`)
        .join("");
    }

    function getFeatureCenter(feature) {
      if (!feature) {
        return { lat: 0, lng: 0 };
      }

      const coordinates = [];
      collectCoordinates(feature.geometry.coordinates, coordinates);

      if (!coordinates.length) {
        return { lat: 0, lng: 0 };
      }

      const sums = coordinates.reduce((total, coordinate) => {
        total.lng += coordinate[0];
        total.lat += coordinate[1];
        return total;
      }, { lat: 0, lng: 0 });

      return {
        lat: sums.lat / coordinates.length,
        lng: sums.lng / coordinates.length
      };
    }

    function collectCoordinates(value, coordinates) {
      if (!Array.isArray(value)) {
        return;
      }

      if (typeof value[0] === "number" && typeof value[1] === "number") {
        coordinates.push(value);
        return;
      }

      value.forEach(item => collectCoordinates(item, coordinates));
    }

    function findCountry(query) {
      const key = countryKey(query);

      return countryOptions.find(country => country.key === key || country.aliases.includes(key)) ||
        countryOptions.find(country => country.name.toLowerCase().startsWith(query.toLowerCase().trim()));
    }

    const subdivisionDatasets = {
      "united states": {
        url: US_STATES_GEOJSON_URL,
        color: "rgba(135, 225, 255, 1)"
      },
      "canada": {
        url: CANADA_SUBDIVISIONS_GEOJSON_URL,
        color: "rgba(135, 225, 255, 1)"
      }
    };

    async function showSubdivisionBorders(countryKeyValue) {
      const dataset = subdivisionDatasets[countryKeyValue];

      if (!dataset) {
        globe.pathsData([]);
        selectedSubdivisionFeatures = [];
        updatePolygonData();
        subdivisionStatus.textContent = "";
        return;
      }

      subdivisionStatus.textContent = "Loading regional borders...";

      if (!subdivisionCache.has(countryKeyValue)) {
        const response = await fetch(dataset.url);

        if (!response.ok) {
          throw new Error("Subdivision data did not load.");
        }

        const geojson = await response.json();
        subdivisionCache.set(countryKeyValue, {
          paths: extractGeoJsonPaths(geojson, dataset.color, countryKeyValue),
          features: extractSubdivisionFeatures(geojson, countryKeyValue)
        });
      }

      const subdivisionData = subdivisionCache.get(countryKeyValue);
      selectedSubdivisionFeatures = subdivisionData.features;
      updatePolygonData();
      globe.pathsData(subdivisionData.paths);
      subdivisionStatus.textContent = countryKeyValue === "united states"
        ? "State borders shown"
        : "Province and territory borders shown";
    }

    function extractGeoJsonPaths(geojson, color, countryKeyValue) {
      return (geojson.features || [])
        .flatMap(feature => geometryToPaths(feature.geometry, color, countryKeyValue, getSubdivisionName(feature)))
        .filter(path => path.points.length > 1);
    }

    function geometryToPaths(geometry, color, countryKeyValue, subdivisionName) {
      if (!geometry) {
        return [];
      }

      if (geometry.type === "Polygon") {
        return geometry.coordinates.map(ring => ringToPath(ring, color, countryKeyValue, subdivisionName));
      }

      if (geometry.type === "MultiPolygon") {
        return geometry.coordinates.flatMap(polygon =>
          polygon.map(ring => ringToPath(ring, color, countryKeyValue, subdivisionName))
        );
      }

      return [];
    }

    function ringToPath(ring, color, countryKeyValue, subdivisionName) {
      return {
        color,
        countryKey: countryKeyValue,
        name: subdivisionName,
        stroke: isMobile() ? 1.35 : 1,
        points: ring.map(([lng, lat]) => ({ lat, lng }))
      };
    }

    function extractSubdivisionFeatures(geojson, countryKeyValue) {
      return (geojson.features || [])
        .map(feature => {
          const subdivisionName = getSubdivisionName(feature);

          return {
            ...feature,
            properties: {
              ...(feature.properties || {}),
              __layer: "subdivision",
              __countryKey: countryKeyValue,
              __subdivisionName: subdivisionName
            }
          };
        })
        .filter(feature => getSubdivisionName(feature));
    }

    function selectCountry(country) {
      if (!country) {
        selectedCountryName.textContent = "Country not found";
        selectedCountryCount.textContent = "";
        countryBarFill.style.width = "0%";
      selectedCountryKey = "";
      globe.pathsData([]);
      selectedSubdivisionFeatures = [];
      updatePolygonData();
      subdivisionStatus.textContent = "";
      refreshCountryHover();
      return;
      }

      const count = countryCounts.get(country.key) || 0;
      const barWidth = Math.round((count / maxCountrySubmissions) * 100);

      selectedCountryKey = country.key;
      selectedCountryName.textContent = country.name;
      selectedCountryCount.textContent = pluralizeSubmission(count);
      countryBarFill.style.width = `${barWidth}%`;
      countrySearch.value = country.name;
      closePopup();
      refreshCountryHover();
      showSubdivisionBorders(country.key).catch(() => {
        globe.pathsData([]);
        selectedSubdivisionFeatures = [];
        updatePolygonData();
        subdivisionStatus.textContent = "Regional borders unavailable";
      });

      globe.pointOfView(
        { lat: country.lat, lng: country.lng, altitude: isMobile() ? 2.35 : 1.75 },
        900
      );
    }

    globe.pointOfView({ lat: 22, lng: 0, altitude: isMobile() ? 2.8 : 2.2 }, 0);

    window.addEventListener("resize", () => {
      globe.width(window.innerWidth).height(window.innerHeight);
    });

    document.addEventListener("click", event => {
      const clickedPopup = popup.contains(event.target);

      if (clickedPopup || ignoreNextDocumentClick) {
        return;
      }

      closePopup();
    });

    imageViewer.addEventListener("click", () => {
      imageViewer.style.display = "none";
      fullImage.removeAttribute("src");
    });

    countrySearch.addEventListener("change", () => {
      selectCountry(findCountry(countrySearch.value));
    });

    countrySearch.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        selectCountry(findCountry(countrySearch.value));
        countrySearch.blur();
      }
    });
  </script>
</body>
