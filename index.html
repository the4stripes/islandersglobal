<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islanders Global</title>
  <script src="https://unpkg.com/globe.gl"></script>
  <link rel="icon" type="image/png" href="logosquare-Photoroom.png">

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #globe {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #header {
      position: absolute;
      top: 40px;
      left: 40px;
      color: white;
      z-index: 10;
    }

    #header h1 {
      margin: 0;
      font-size: 48px;
      letter-spacing: 3px;
    }

    #header p {
      margin-top: 8px;
      color: orange;
      font-size: 18px;
    }

    #stats {
      position: absolute;
      top: 150px;
      left: 40px;
      color: white;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    #stats div {
      margin: 8px 0;
      font-size: 18px;
    }

    #submitButton {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      z-index: 20;
      overflow: hidden;
      border-radius: 50%;
      border: 3px solid orange;
      background: #050505;
      box-shadow: 0 0 24px rgba(255, 140, 0, 0.45);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    #submitButton:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 0 32px rgba(255, 140, 0, 0.65);
      opacity: 0.88;
    }

    #submitButton img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #popup {
      position: fixed;
      left: 40px;
      bottom: 40px;
      width: 320px;
      background: rgba(15, 15, 15, 0.95);
      color: white;
      border: 2px solid orange;
      border-radius: 16px;
      overflow: hidden;
      display: none;
      z-index: 30;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 25px rgba(255, 140, 0, 0.35);
    }

    #popup img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      cursor: zoom-in;
    }

    .popup-content {
      padding: 15px;
    }

    .popup-user {
      font-size: 20px;
      font-weight: bold;
      color: orange;
    }

    .popup-location {
      margin-top: 8px;
      color: #ccc;
    }

    #imageViewer {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
      background: rgba(0, 0, 0, 0.86);
      cursor: zoom-out;
    }

    #fullImage {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border: 2px solid orange;
      box-shadow: 0 0 32px rgba(255, 140, 0, 0.35);
    }

    @media (max-width: 700px) {
      #header {
        top: 24px;
        left: 20px;
        right: 20px;
      }

      #header h1 {
        font-size: 32px;
      }

      #stats {
        top: 120px;
        left: 20px;
      }

      #popup {
        left: 20px;
        right: 20px;
        bottom: 120px;
        width: auto;
      }

      #submitButton {
        right: 18px;
        bottom: 18px;
        width: 68px;
        height: 68px;
      }
    }
  </style>
</head>

<body>
  <div id="globe"></div>

  <header id="header">
    <h1>ISLANDERS GLOBAL</h1>
    <p>Repping the Isles Worldwide</p>
  </header>

  <section id="stats" aria-label="Fan stats">
    <div>Countries Repped: <span id="countryCount">0</span></div>
    <div>Fan Locations: <span id="locationCount">0</span></div>
  </section>

  <a
    id="submitButton"
    href="https://forms.gle/eCSmtH5WxMiZtdSZ7"
    target="_blank"
    rel="noopener noreferrer"
    title="Submit Photo"
  >
    <img src="logosquare-Photoroom.png" alt="">
    <span class="sr-only">Submit Photo</span>
  </a>

  <aside id="popup"></aside>

  <div id="imageViewer" aria-label="Expanded photo">
    <img id="fullImage" alt="">
  </div>

  <script>
    const locations = [
      {
        lat: 59.33,
        lng: 18.06,
        username: "vic.eklund",
        date: "Stockholm, Sweden, March 2026",
        photo: "https://www.dailyfaceoff.com/_next/image?url=https%3A%2F%2Fpublish.dailyfaceoff.com%2Fwp-content%2Fuploads%2F2025%2F06%2FSE5_3128-scaled.jpg&w=3840&q=75"
      }
    ];

    const popup = document.getElementById("popup");
    const imageViewer = document.getElementById("imageViewer");
    const fullImage = document.getElementById("fullImage");

    document.getElementById("locationCount").textContent = locations.length;

    const countries = new Set(
      locations
        .map(location => location.date.split(",")[1]?.trim())
        .filter(Boolean)
    );

    document.getElementById("countryCount").textContent = countries.size;

    const globe = Globe()(document.getElementById("globe"))
      .width(window.innerWidth)
      .height(window.innerHeight)
      .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-dark.jpg")
      .backgroundColor("#000")
      .pointsData(locations)
      .pointLat("lat")
      .pointLng("lng")
      .pointColor(() => "#ff7b00")
      .pointAltitude(0.02)
      .pointRadius(0.55)
      .ringsData(locations)
      .ringLat("lat")
      .ringLng("lng")
      .ringColor(() => "orange")
      .ringMaxRadius(3)
      .ringPropagationSpeed(2)
      .ringRepeatPeriod(1000)
      .onPointClick(point => {
        popup.innerHTML = `
          <img src="${point.photo}" alt="Photo from ${point.date}">
          <div class="popup-content">
            <div class="popup-user">@${point.username}</div>
            <div class="popup-location">${point.date}</div>
          </div>
        `;

        popup.style.display = "block";

        const popupImg = popup.querySelector("img");
        popupImg.addEventListener("click", () => {
          fullImage.src = popupImg.src;
          fullImage.alt = popupImg.alt;
          imageViewer.style.display = "flex";
        });

        globe.pointOfView(
          { lat: point.lat, lng: point.lng, altitude: 1.5 },
          1000
        );
      });

    globe.pointOfView({ lat: 30, lng: 0, altitude: 2.2 }, 0);

    window.addEventListener("resize", () => {
      globe.width(window.innerWidth).height(window.innerHeight);
    });

    document.addEventListener("click", event => {
      const clickedPopup = popup.contains(event.target);
      const clickedCanvas = event.target.closest("canvas");

      if (!clickedPopup && !clickedCanvas) {
        popup.style.display = "none";
      }
    });

    imageViewer.addEventListener("click", () => {
      imageViewer.style.display = "none";
      fullImage.removeAttribute("src");
    });
  </script>
</body>
</html>
