<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islanders Global</title>
  <script src="https://unpkg.com/globe.gl"></script>
  <link rel="icon" type="image/png" href="logosquare-Photoroom.png">

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #globe {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #header {
      position: absolute;
      top: 40px;
      left: 40px;
      color: white;
      z-index: 10;
    }

    #header h1 {
      margin: 0;
      font-size: 48px;
      letter-spacing: 3px;
    }

    #header p {
      margin-top: 8px;
      color: orange;
      font-size: 18px;
    }

    #stats {
      position: absolute;
      top: 150px;
      left: 40px;
      color: white;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    #stats div {
      margin: 8px 0;
      font-size: 18px;
    }

    #countryPanel {
      position: absolute;
      top: 150px;
      right: 24px;
      width: 290px;
      z-index: 12;
      color: white;
      background: rgba(0, 0, 0, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      padding: 14px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 22px rgba(0, 0, 0, 0.35);
    }

    #countrySearch {
      width: 100%;
      height: 38px;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      padding: 0 12px;
      font-size: 15px;
      outline: none;
    }

    #countrySearch:focus {
      border-color: orange;
      box-shadow: 0 0 0 2px rgba(255, 140, 0, 0.18);
    }

    #countrySearch::placeholder {
      color: rgba(255, 255, 255, 0.72);
    }

    .country-summary {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      font-size: 14px;
    }

    #selectedCountryName {
      color: orange;
      font-weight: bold;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #selectedCountryCount {
      flex: 0 0 auto;
      color: #ddd;
      font-size: 13px;
    }

    .country-bar {
      height: 8px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
    }

    #countryBarFill {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff7b00, #ffbf33);
      transition: width 0.25s ease;
    }

    #logo {
      position: absolute;
      top: 15px;
      right: 10px;
      width: 220px;
      height: auto;
      cursor: pointer;
      transition: opacity 0.3s ease, filter 0.3s ease;
      z-index: 10;
    }

    #logo:hover {
      opacity: 0.6;
      filter: blur(2px);
    }

    #submitButton {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      z-index: 20;
      overflow: hidden;
      border-radius: 50%;
      border: 3px solid orange;
      background: #050505;
      box-shadow: 0 0 24px rgba(255, 140, 0, 0.45);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    #submitButton:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 0 32px rgba(255, 140, 0, 0.65);
      opacity: 0.88;
    }

    #submitButton img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #popup {
      position: fixed;
      left: 40px;
      bottom: 40px;
      width: 320px;
      background: rgba(15, 15, 15, 0.95);
      color: white;
      border: 2px solid orange;
      border-radius: 16px;
      overflow: hidden;
      display: none;
      z-index: 30;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 25px rgba(255, 140, 0, 0.35);
    }

    #popup img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      cursor: zoom-in;
    }

    .popup-content {
      padding: 15px;
    }

    .popup-user {
      font-size: 20px;
      font-weight: bold;
      color: orange;
    }

    .popup-location {
      margin-top: 8px;
      color: #ccc;
    }

    #imageViewer {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
      background: rgba(0, 0, 0, 0.86);
      cursor: zoom-out;
    }

    #fullImage {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border: 2px solid orange;
      box-shadow: 0 0 32px rgba(255, 140, 0, 0.35);
    }

    @media (max-width: 700px) {
      #header {
        top: max(22px, env(safe-area-inset-top));
        left: 20px;
        right: 150px;
      }

      #header h1 {
        font-size: 29px;
        line-height: 1.08;
        letter-spacing: 4px;
      }

      #header p {
        margin-top: 10px;
        width: max-content;
        max-width: calc(100vw - 40px);
        font-size: 18px;
        line-height: 1.25;
      }

      #logo {
        top: max(24px, env(safe-area-inset-top));
        right: 16px;
        width: 124px;
      }

      #stats {
        position: fixed;
        top: auto;
        left: auto;
        right: 18px;
        bottom: 126px;
        width: auto;
        max-width: 175px;
        padding: 9px 11px;
        border-radius: 999px;
        text-align: right;
        background: rgba(0, 0, 0, 0.72);
        box-shadow: 0 0 16px rgba(255, 140, 0, 0.18);
      }

      #stats div {
        margin: 2px 0;
        font-size: 12px;
        line-height: 1.15;
        white-space: nowrap;
      }

      #popup {
        left: 16px;
        right: 16px;
        bottom: 96px;
        width: auto;
        height: 164px;
        border-radius: 18px;
      }

      #popup img {
        float: left;
        width: 38%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        border-right: 2px solid orange;
      }

      .popup-content {
        min-height: 100%;
        padding: 26px 18px 18px calc(38% + 18px);
        box-sizing: border-box;
      }

      .popup-user {
        font-size: 21px;
        line-height: 1.1;
      }

      .popup-location {
        margin-top: 8px;
        font-size: 15px;
        line-height: 1.25;
      }

      body.popup-open #stats {
        opacity: 0;
        pointer-events: none;
      }

      #countryPanel {
        top: auto;
        left: 18px;
        right: 112px;
        bottom: 18px;
        width: auto;
        padding: 10px;
        border-radius: 14px;
      }

      #countrySearch {
        height: 34px;
        border-radius: 9px;
        font-size: 14px;
      }

      .country-summary {
        margin-top: 8px;
        gap: 8px;
        font-size: 12px;
      }

      #selectedCountryCount {
        font-size: 11px;
      }

      .country-bar {
        height: 6px;
        margin-top: 7px;
      }

      body.popup-open #countryPanel {
        opacity: 0;
        pointer-events: none;
      }

      #submitButton {
        right: 18px;
        bottom: 18px;
        width: 68px;
        height: 68px;
      }
    }

    @media (max-width: 390px) {
      #header {
        right: 132px;
      }

      #header h1 {
        font-size: 25px;
        letter-spacing: 3px;
      }

      #header p,
      #stats div {
        font-size: 16px;
      }

      #stats div {
        font-size: 11px;
      }

      #logo {
        width: 112px;
      }

      #stats {
        right: 16px;
        bottom: 118px;
      }
    }
  </style>
</head>

<body>
  <div id="globe"></div>

  <header id="header">
    <h1>ISLANDERS GLOBAL</h1>
    <p>Repping the Isles Worldwide</p>
  </header>

  <img id="logo" src="logo" alt="Islanders Global logo">

  <section id="stats" aria-label="Fan stats">
    <div>Countries Repped: <span id="countryCount">0</span></div>
    <div>Fan Locations: <span id="locationCount">0</span></div>
  </section>

  <section id="countryPanel" aria-label="Country search">
    <label class="sr-only" for="countrySearch">Search country</label>
    <input
      id="countrySearch"
      type="search"
      list="countryList"
      placeholder="Search country"
      autocomplete="off"
    >
    <datalist id="countryList"></datalist>
    <div class="country-summary">
      <span id="selectedCountryName">Select a country</span>
      <span id="selectedCountryCount">0 submissions</span>
    </div>
    <div class="country-bar" aria-hidden="true">
      <span id="countryBarFill"></span>
    </div>
  </section>

  <a
    id="submitButton"
    href="YOUR_GOOGLE_FORM_LINK"
    target="_blank"
    rel="noopener noreferrer"
    title="Submit Photo"
  >
    <img src="logosquare-Photoroom.png" alt="">
    <span class="sr-only">Submit Photo</span>
  </a>

  <aside id="popup"></aside>

  <div id="imageViewer" aria-label="Expanded photo">
    <img id="fullImage" alt="">
  </div>

  <script>
    const WORLD_GEOJSON_URL = "https://cdn.jsdelivr.net/gh/johan/world.geo.json@master/countries.geo.json";
    const COUNTRY_LIST_URL = "https://cdn.jsdelivr.net/npm/world-countries@5/countries.json";
    const MOBILE_POINT_TAP_RADIUS_DEGREES = 5;

    const locations = [
      {
        lat: 59.33,
        lng: 18.06,
        username: "vic.eklund",
        date: "Stockholm, Sweden, March 2026",
        country: "Sweden",
        photo: "https://www.dailyfaceoff.com/_next/image?url=https%3A%2F%2Fpublish.dailyfaceoff.com%2Fwp-content%2Fuploads%2F2025%2F06%2FSE5_3128-scaled.jpg&w=3840&q=75"
      }
    ];

    const popup = document.getElementById("popup");
    const imageViewer = document.getElementById("imageViewer");
    const fullImage = document.getElementById("fullImage");
    const countrySearch = document.getElementById("countrySearch");
    const countryList = document.getElementById("countryList");
    const selectedCountryName = document.getElementById("selectedCountryName");
    const selectedCountryCount = document.getElementById("selectedCountryCount");
    const countryBarFill = document.getElementById("countryBarFill");

    let hoveredCountry = null;
    let countryOptions = [];
    let ignoreNextDocumentClick = false;

    const closePopup = () => {
      popup.style.display = "none";
      document.body.classList.remove("popup-open");
    };

    const countryAliases = {
      "cabo verde": "cape verde",
      "cote divoire": "ivory coast",
      "czech republic": "czechia",
      "democratic republic of the congo": "dr congo",
      "republic of the congo": "congo",
      "russian federation": "russia",
      "south korea": "korea, republic of",
      "north korea": "korea, democratic people's republic of",
      "syrian arab republic": "syria",
      "turkiye": "turkey",
      "united republic of tanzania": "tanzania",
      "united states of america": "united states",
      "usa": "united states",
      "u.s.a.": "united states",
      "us": "united states",
      "uk": "united kingdom",
      "viet nam": "vietnam"
    };

    const cleanCountryName = name => (name || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .replace(/&/g, "and")
      .replace(/[^\w\s'-]/g, "")
      .replace(/\bthe\b/g, "")
      .replace(/\s+/g, " ")
      .trim();

    const countryKey = name => {
      const cleaned = cleanCountryName(name);
      return countryAliases[cleaned] || cleaned;
    };

    const getLocationCountry = location => {
      if (location.country) {
        return location.country;
      }

      return location.date.split(",")[1]?.trim() || "";
    };

    const countryCounts = locations.reduce((counts, location) => {
      const key = countryKey(getLocationCountry(location));

      if (key) {
        counts.set(key, (counts.get(key) || 0) + 1);
      }

      return counts;
    }, new Map());

    const maxCountrySubmissions = Math.max(1, ...countryCounts.values());

    document.getElementById("locationCount").textContent = locations.length;
    document.getElementById("countryCount").textContent = countryCounts.size;

    const isMobile = () => window.innerWidth <= 700;

    const globe = Globe()(document.getElementById("globe"))
      .width(window.innerWidth)
      .height(window.innerHeight)
      .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-dark.jpg")
      .backgroundColor("#000")
      .pointsData(locations)
      .pointLat("lat")
      .pointLng("lng")
      .pointColor(() => "#ff7b00")
      .pointAltitude(0.06)
      .pointRadius(0.55)
      .ringsData(locations)
      .ringLat("lat")
      .ringLng("lng")
      .ringColor(() => "orange")
      .ringMaxRadius(3)
      .ringPropagationSpeed(2)
      .ringRepeatPeriod(1000)
      .onPointClick(point => {
        openLocationCard(point);
      })
      .onGlobeClick(coords => {
        if (!isMobile()) {
          return;
        }

        const closestPoint = locations
          .map(location => ({
            location,
            distance: globeDistanceDegrees(location, coords)
          }))
          .sort((a, b) => a.distance - b.distance)[0];

        if (closestPoint && closestPoint.distance < MOBILE_POINT_TAP_RADIUS_DEGREES) {
          openLocationCard(closestPoint.location);
        }
      });

    loadCountries();

    function openLocationCard(point) {
      ignoreNextDocumentClick = true;
      setTimeout(() => {
        ignoreNextDocumentClick = false;
      }, 0);

      popup.innerHTML = `
        <img src="${point.photo}" alt="Photo from ${point.date}">
        <div class="popup-content">
          <div class="popup-user">@${point.username}</div>
          <div class="popup-location">${point.date}</div>
        </div>
      `;

      popup.style.display = "block";
      document.body.classList.add("popup-open");

      const popupImg = popup.querySelector("img");
      popupImg.addEventListener("click", () => {
        fullImage.src = popupImg.src;
        fullImage.alt = popupImg.alt;
        imageViewer.style.display = "flex";
      });

      globe.pointOfView(
        { lat: point.lat, lng: point.lng, altitude: isMobile() ? 2.25 : 1.5 },
        isMobile() ? 650 : 1000
      );
    }

    function globeDistanceDegrees(a, b) {
      const averageLat = ((a.lat + b.lat) / 2) * Math.PI / 180;
      const latDistance = a.lat - b.lat;
      const lngDistance = (a.lng - b.lng) * Math.cos(averageLat);

      return Math.hypot(latDistance, lngDistance);
    }

    function getFeatureName(feature) {
      return feature.properties?.name ||
        feature.properties?.ADMIN ||
        feature.properties?.NAME ||
        "";
    }

    function getCountryCount(name) {
      return countryCounts.get(countryKey(name)) || 0;
    }

    function pluralizeSubmission(count) {
      return `${count} submission${count === 1 ? "" : "s"}`;
    }

    function countryTooltip(feature) {
      const name = getFeatureName(feature);
      const count = getCountryCount(name);

      return `
        <div style="padding: 8px 10px; color: white; background: rgba(0, 0, 0, 0.82); border: 1px solid orange; border-radius: 8px;">
          <strong style="color: orange;">${name}</strong><br>
          ${pluralizeSubmission(count)}
        </div>
      `;
    }

    function countryAltitude(feature) {
      return feature === hoveredCountry ? 0.05 : 0.006;
    }

    function countryCapColor(feature) {
      if (feature === hoveredCountry) {
        return "rgba(255, 123, 0, 0.46)";
      }

      return getCountryCount(getFeatureName(feature)) > 0
        ? "rgba(255, 123, 0, 0.2)"
        : "rgba(255, 255, 255, 0.035)";
    }

    function refreshCountryHover() {
      globe
        .polygonAltitude(countryAltitude)
        .polygonCapColor(countryCapColor);
    }

    async function loadCountries() {
      try {
        const [geoResponse, countryResponse] = await Promise.all([
          fetch(WORLD_GEOJSON_URL),
          fetch(COUNTRY_LIST_URL)
        ]);

        if (!geoResponse.ok || !countryResponse.ok) {
          throw new Error("Country data did not load.");
        }

        const world = await geoResponse.json();
        const countries = await countryResponse.json();
        const countryFeatures = world.features || [];

        globe
          .polygonsData(countryFeatures)
          .polygonAltitude(countryAltitude)
          .polygonCapColor(countryCapColor)
          .polygonSideColor(() => "rgba(255, 140, 0, 0.08)")
          .polygonStrokeColor(() => "rgba(255, 255, 255, 0.42)")
          .polygonLabel(countryTooltip)
          .onPolygonHover(feature => {
            hoveredCountry = feature;
            refreshCountryHover();
          });

        buildCountrySearch(countries, countryFeatures);
      } catch (error) {
        selectedCountryName.textContent = "Country search unavailable";
        selectedCountryCount.textContent = "";
      }
    }

    function buildCountrySearch(countries, countryFeatures) {
      const featureLookup = new Map(
        countryFeatures.map(feature => {
          const name = getFeatureName(feature);
          return [countryKey(name), feature];
        })
      );

      countryOptions = countries
        .filter(country => country.unMember || country.cca2 === "VA" || country.cca2 === "PS")
        .map(country => {
          const name = country.name.common;
          const key = countryKey(name);
          const matchingFeature = featureLookup.get(key);
          const center = Array.isArray(country.latlng) && country.latlng.length === 2
            ? { lat: country.latlng[0], lng: country.latlng[1] }
            : getFeatureCenter(matchingFeature);

          return {
            name,
            key,
            lat: center.lat,
            lng: center.lng,
            aliases: [
              name,
              country.name.official,
              ...(country.altSpellings || [])
            ].map(countryKey)
          };
        })
        .filter(country => Number.isFinite(country.lat) && Number.isFinite(country.lng))
        .sort((a, b) => a.name.localeCompare(b.name));

      countryList.innerHTML = countryOptions
        .map(country => `<option value="${country.name}"></option>`)
        .join("");
    }

    function getFeatureCenter(feature) {
      if (!feature) {
        return { lat: 0, lng: 0 };
      }

      const coordinates = [];
      collectCoordinates(feature.geometry.coordinates, coordinates);

      if (!coordinates.length) {
        return { lat: 0, lng: 0 };
      }

      const sums = coordinates.reduce((total, coordinate) => {
        total.lng += coordinate[0];
        total.lat += coordinate[1];
        return total;
      }, { lat: 0, lng: 0 });

      return {
        lat: sums.lat / coordinates.length,
        lng: sums.lng / coordinates.length
      };
    }

    function collectCoordinates(value, coordinates) {
      if (!Array.isArray(value)) {
        return;
      }

      if (typeof value[0] === "number" && typeof value[1] === "number") {
        coordinates.push(value);
        return;
      }

      value.forEach(item => collectCoordinates(item, coordinates));
    }

    function findCountry(query) {
      const key = countryKey(query);

      return countryOptions.find(country => country.key === key || country.aliases.includes(key)) ||
        countryOptions.find(country => country.name.toLowerCase().startsWith(query.toLowerCase().trim()));
    }

    function selectCountry(country) {
      if (!country) {
        selectedCountryName.textContent = "Country not found";
        selectedCountryCount.textContent = "";
        countryBarFill.style.width = "0%";
        return;
      }

      const count = countryCounts.get(country.key) || 0;
      const barWidth = Math.round((count / maxCountrySubmissions) * 100);

      selectedCountryName.textContent = country.name;
      selectedCountryCount.textContent = pluralizeSubmission(count);
      countryBarFill.style.width = `${barWidth}%`;
      countrySearch.value = country.name;
      closePopup();

      globe.pointOfView(
        { lat: country.lat, lng: country.lng, altitude: isMobile() ? 2.35 : 1.75 },
        900
      );
    }

    globe.pointOfView({ lat: 22, lng: 0, altitude: isMobile() ? 2.8 : 2.2 }, 0);

    window.addEventListener("resize", () => {
      globe.width(window.innerWidth).height(window.innerHeight);
    });

    document.addEventListener("click", event => {
      const clickedPopup = popup.contains(event.target);

      if (clickedPopup || ignoreNextDocumentClick) {
        return;
      }

      closePopup();
    });

    imageViewer.addEventListener("click", () => {
      imageViewer.style.display = "none";
      fullImage.removeAttribute("src");
    });

    countrySearch.addEventListener("change", () => {
      selectCountry(findCountry(countrySearch.value));
    });

    countrySearch.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        selectCountry(findCountry(countrySearch.value));
        countrySearch.blur();
      }
    });
  </script>
</body>
</html>
